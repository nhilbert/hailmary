services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: hailmary
      POSTGRES_USER: hailmary
      POSTGRES_PASSWORD: hailmary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://hailmary:hailmary@db:5432/hailmary
    depends_on:
      - db
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  pgdata:
